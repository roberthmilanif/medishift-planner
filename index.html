<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e88e5">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>MediShift Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fas fa-hospital-user"></i> MediShift Planner</h1>
                <div class="header-actions">
                    <button id="addPatientBtn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Adicionar Paciente
                    </button>
                    <button id="refreshBtn" class="btn btn-icon" title="Atualizar">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>
            <div class="search-filters">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar por nome, leito ou diagnóstico...">
                </div>
                <select id="filterPriority" class="filter-select">
                    <option value="">Todas Prioridades</option>
                    <option value="Alta">Alta</option>
                    <option value="Média">Média</option>
                    <option value="Baixa">Baixa</option>
                </select>
                <select id="filterAuthor" class="filter-select">
                    <option value="">Todos Autores</option>
                </select>
            </div>
        </header>

        <!-- Loading State -->
        <div id="loadingState" class="loading-state">
            <div class="loading-spinner"></div>
            <p>Carregando pacientes...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-bed fa-3x"></i>
            <h3>Nenhum paciente encontrado</h3>
            <p>Adicione o primeiro paciente para começar</p>
        </div>

        <!-- Patients Grid -->
        <div id="patientsGrid" class="patients-grid"></div>
    </div>

    <!-- Patient Modal -->
    <div id="patientModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Adicionar Paciente</h2>
                <button class="modal-close" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="patientForm">
                <input type="hidden" id="patientId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="patientName">Nome do Paciente *</label>
                        <input type="text" id="patientName" required>
                    </div>
                    <div class="form-group">
                        <label for="bedNumber">Leito *</label>
                        <input type="text" id="bedNumber" required placeholder="Ex: 201A">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="admissionDate">Data de Admissão *</label>
                        <input type="date" id="admissionDate" required>
                        <small class="form-help">DIH será calculado automaticamente</small>
                    </div>
                    <div class="form-group">
                        <label for="priority">Prioridade</label>
                        <select id="priority">
                            <option value="Baixa">Baixa</option>
                            <option value="Média">Média</option>
                            <option value="Alta">Alta</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="diagnosis">Diagnóstico</label>
                    <textarea id="diagnosis" rows="2" placeholder="Diagnóstico principal e secundários"></textarea>
                </div>

                <div class="form-group">
                    <label for="antibiotics">Antibioticoterapia</label>
                    <div class="antibiotics-container">
                        <div class="antibiotic-entry">
                            <input type="text" id="antibioticName" placeholder="Medicamento (Ex: Meropenem)">
                            <input type="date" id="antibioticDate" placeholder="Data início">
                            <small class="antibiotic-days"></small>
                        </div>
                    </div>
                    <button type="button" id="addAntibioticBtn" class="btn btn-small">
                        <i class="fas fa-plus"></i> Adicionar antibiótico
                    </button>
                </div>

                <div class="form-group">
                    <label for="currentCondition">Condição Atual</label>
                    <textarea id="currentCondition" rows="3" placeholder="Estado geral, intercorrências, evolução..."></textarea>
                </div>

                <div class="form-group">
                    <label for="pendingActions">Pendências</label>
                    <textarea id="pendingActions" rows="2" placeholder="Exames pendentes, procedimentos..."></textarea>
                </div>

                <div class="form-group">
                    <label for="nextSteps">Próximos Passos</label>
                    <textarea id="nextSteps" rows="2" placeholder="Planejamento, condutas..."></textarea>
                </div>

                <div class="form-group">
                    <label for="author">Autor *</label>
                    <input type="text" id="author" required placeholder="Seu nome">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="medishift-planner.js"></script>
</body>
</html>
